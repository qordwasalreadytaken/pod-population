<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>PoD Population Watch</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: sans-serif;
      font-size: 14px;
      margin: 20px;
      background: #0f0f0f;
      color: #eee;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      max-width: 96vw;
    }

    canvas {
      background: #1a1a1a;
      padding: 10px;
      border-radius: 8px;
    }

    .summary {
        background: #1a1a1a;
        padding: 15px;
        border-radius: 8px;
        margin-bottom: 20px;
        line-height: 1.6;
    }

    .summary h2 {
        margin-top: 0;
    }

    h1 { margin-bottom: 10px; }
    small { color: #aaa; }

  .chart-card {

      cursor: zoom-in;

      transition:
          transform .15s ease,
          box-shadow .15s ease;

      border-radius: 8px;
  }

  .chart-card:hover {

      transform: scale(1.02);

      box-shadow: 0 8px 24px rgba(0,0,0,.35);

  }

  .modal {
      position: fixed;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;

      background: rgba(0,0,0,0);

      opacity: 0;
      pointer-events: none;

      transition:
          opacity .25s ease,
          background .25s ease;

      z-index: 1000;
  }

  .modal.show {
      opacity: 1;
      pointer-events: auto;
      background: rgba(0,0,0,.85);
  }

    .modal-content {
        position: relative;
        width: 90vw;
        height: 90vh;

        background: #222;
        border-radius: 12px;
        padding: 20px;

        display: flex;
        flex-direction: column;
    }

    .modal-chart-container {
        transition: opacity .2s ease;
        flex: 1;
        position: relative;
        min-height: 0; /* important in flex layouts */
    }

  .modal.show .modal-content {
      transform: scale(1);
      opacity: 1;
  }


  #closeModal {
      position: absolute;
      top: 10px;
      right: 15px;
      font-size: 28px;
      border: none;
      background: none;
      color: white;
      cursor: pointer;
  }

  .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;

        margin-bottom: 10px;
    }

    #modalTitle {
        margin: 0;
        color: white;
        font-size: 1.4rem;
        font-weight: 600;
    }

    .modal-stats {

        margin-bottom: 10px;
        padding: 8px 12px;

        background: #2b2b2b;

        border-radius: 6px;

        color: #ccc;
        font-size: .95rem;
    }

    .range-bar{
        display:flex;
        gap:10px;
        margin:15px 0;
    }

    .range-btn{
        padding:8px 16px;
        background:#333;
        color:white;
        border:1px solid #555;
        border-radius:6px;
        cursor:pointer;
    }

    .range-btn:hover{
        background:#444;
    }

    .range-btn.active{
        background:#0078d4;
    }

    .live-row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 6px 0 14px;
    }

    .live-btn {
        padding: 8px 16px;
        background: #14532d;
        color: #eafff0;
        border: 1px solid #1f7a45;
        border-radius: 6px;
        cursor: pointer;
    }

    .live-btn:hover {
        background: #1a6a3a;
    }

    .live-btn:disabled {
        opacity: .6;
        cursor: wait;
    }

    .live-status {
        color: #9ac6ff;
        font-size: .92em;
    }

    .help {
        cursor: help;
        color: #888;
        margin-left: 4px;
        font-size: 0.85em;
    }

    .help:hover {
        color: #fff;
    }
  </style>
</head>
<body>

<h1>PoD Population Watch</h1>
<small id="status">Loading...</small>

<div class="range-bar">
    <button class="range-btn active" data-days="all">All</button>
    <button class="range-btn" data-days="30">Last 30 Days</button>
    <button class="range-btn" data-days="7">Last 7 Days</button>
    <button class="range-btn" data-days="1">Last 24 Hours</button>
</div>

<div class="live-row">
    <button id="liveNowBtn" class="live-btn">Live Snapshot Now</button>
    <small id="liveStatus" class="live-status"></small>
</div>

<div id="summary" class="summary">
    Loading...
</div>

<div class="grid">
  <div class="chart-card" data-chart="online">
      <canvas id="onlineChart"></canvas>
  </div>

  <div class="chart-card" data-chart="occupancy">
      <canvas id="occupancyChart"></canvas>
  </div>

  <div class="chart-card" data-chart="public">
      <canvas id="publicChart"></canvas>
  </div>

  <div class="chart-card" data-chart="introvert">
      <canvas id="introvertChart"></canvas>
  </div>
</div>
<div id="chartModal" class="modal">
    <div class="modal-content">

        <div class="modal-header">
            <h2 id="modalTitle"></h2>
            <button id="closeModal">&times;</button>
        </div>

        <div id="modalStats" class="modal-stats"></div>

        <div class="modal-chart-container">
            <canvas id="modalChart"></canvas>
        </div>

    </div>
</div>
<script src="app.js"></script>
</body>
</html>
