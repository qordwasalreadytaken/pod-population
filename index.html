<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>PoD Population Watch</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: sans-serif;
      margin: 20px;
      background: #0f0f0f;
      color: #eee;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    canvas {
      background: #1a1a1a;
      padding: 10px;
      border-radius: 8px;
    }

    .summary {
        background: #1a1a1a;
        padding: 15px;
        border-radius: 8px;
        margin-bottom: 20px;
        line-height: 1.6;
    }

    .summary h2 {
        margin-top: 0;
    }

    h1 { margin-bottom: 10px; }
    small { color: #aaa; }
  </style>
</head>
<body>

<h1>PoD Population Watch</h1>
<small>15-min snapshots • local analysis</small>

<div id="summary" class="summary">
    Loading...
</div>

<div class="grid">
  <canvas id="onlineChart"></canvas>
  <canvas id="occupancyChart"></canvas>
  <canvas id="publicChart"></canvas>
  <canvas id="introvertChart"></canvas>
</div>

<script src="app.js"></script>
</body>
</html>
