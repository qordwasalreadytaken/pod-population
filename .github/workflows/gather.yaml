name: PoD Population Collector

on:
  schedule:
    - cron: '00,15,30,45 * * * *'
  workflow_dispatch:

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run collector
        run: python gather-population.py

      - name: Run collector
        run: python generate-activity.py

      - name: Commit and push changes
        run: |
          git config user.name "Qords-bot"
          git config user.email "nicetry@noway.com"

          git add data/

          # Exit cleanly if nothing changed
          git diff --cached --quiet && exit 0

          git commit -m "Population snapshot $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push        