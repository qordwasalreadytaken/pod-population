<!DOCTYPE html>

<html>

<head>

<meta charset="utf-8">

<title>PoD Activity Watch</title>

<link rel="stylesheet" href="css/pod.css">

  <style>
    body {
      font-family: sans-serif;
      font-size: 14px;
      margin: 20px;
      background: #0f0f0f;
      color: #eee;
    }

    .td {
        width: auto;
    }

    #snapshotSummary, .grid {
        margin: 12px 0 18px;
        text-align: left;
        background: #1a1a1a;
        padding: 15px;
        border-radius: 8px;
        margin-bottom: 20px;
        line-height: 1.6;
        max-width: 70%;
    }

    .snapshot-line {
        margin: 4px 0;
        line-height: 1.5;
    }

    .count-table, .games, .stats {
        border-collapse: collapse;
        margin-left: 40px;
    }

    .count-table td {
        padding: 4px 0;
        width: 150px;
    }

    .mini-bar {
        width: 100%;
        height: 8px;
        background: #333;
        border-radius: 4px;
        overflow: hidden;
    }

    .mini-bar-fill {
        height: 100%;
        transition: width .4s ease;
    }

    .muted {
        color: #999;
        font-size: .9em;
    }

    #stats, #games {
        border-collapse: collapse;
        margin-left: 40px;
    }    
  </style>
</head>

<body>

<h1>PoD Activity Watch</h1>

<p id="timestamp"></p>

<div id="snapshotSummary" class="summary-box"></div>

<div class="grid">

<div class="panel">

<h2>Difficulty</h2>

<div id="difficulty"></div>

</div>

<div class="panel">

<h2>Mode</h2>

<div id="mode"></div>

</div>
<div class="panel">
    <h2>Current Game Activities</h2>
    <div id="activities"></div>
</div>
</div>

<div class="grid">
<div class="panel">

<h2>Top Public Game Names</h2>

<table id="games"></table>

</div>

<div class="panel">

<h2>Interesting Stats</h2>

<div id="stats"></div>

</div>



<script src="activity.js"></script>

</body>

</html>
