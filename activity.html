<!DOCTYPE html>

<html>

<head>

<meta charset="utf-8">

<title>PoD Activity Watch</title>

<link rel="stylesheet" href="css/pod.css">

</head>

<body>

<h1>PoD Activity Watch</h1>

<p id="timestamp"></p>

<div class="grid">

<div class="panel">

<h2>Difficulty</h2>

<div id="difficulty"></div>

</div>

<div class="panel">

<h2>Mode</h2>

<div id="mode"></div>

</div>

</div>

<div class="panel">

<h2>Top Public Game Names</h2>

<table id="games"></table>

</div>

<div class="panel">

<h2>Interesting Stats</h2>

<div id="stats"></div>

</div>

<div class="panel">
    <h2>Current Activities</h2>
    <div id="activities"></div>
</div>

<script src="activity.js"></script>

</body>

</html>
